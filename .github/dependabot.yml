# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "daily"
      time: "04:00"
      timezone: "UTC"

    # Limit number of open PRs
    open-pull-requests-limit: 20

    # Automatically rebase stale PRs
    rebase-strategy: "auto"

    # Labels for PR management
    labels:
      - "dependencies"
      - "security"
      - "cve"

    # Commit message customization
    commit-message:
      prefix: "deps"
      include: "scope"

    # Group related dependency updates
    groups:
      jackson:
        patterns:
          - "com.fasterxml.jackson*"

      apache:
        patterns:
          - "org.apache.*"

      guava:
        patterns:
          - "com.google.guava*"

      airlift:
        patterns:
          - "io.airlift*"

      test-dependencies:
        dependency-type: "development"

    # Security + version update strategy
    versioning-strategy: increase

    # Allow both direct and transitive dependency updates
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

    # Ignore unstable versions
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    # Reviewers (optional)
    reviewers:
      - "your-github-team"

    # Assignees (optional)
    assignees:
      - "your-github-username"
